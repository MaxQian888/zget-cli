name: Go Lint

on:
  push:
    branches: ['main', 'master']
  pull_request:

permissions:
  contents: read

jobs:
  detect-go:
    runs-on: ubuntu-latest
    outputs:
      has_go: ${{ steps.detect.outputs.has_go }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Go modules
        id: detect
        shell: bash
        run: |
          if find . -path '*/vendor/*' -prune -o -name 'go.mod' -print -quit | grep -q .; then
            echo "has_go=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_go=false" >> "$GITHUB_OUTPUT"
          fi

  golangci-lint:
    name: Docker golangci-lint
    needs: detect-go
    if: needs.detect-go.outputs.has_go == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run golangci-lint for each Go module in Docker
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t modules < <(find . -path '*/vendor/*' -prune -o -name 'go.mod' -print | sort)
          if [ "${#modules[@]}" -eq 0 ]; then
            echo "No Go modules found."
            exit 0
          fi

          for go_mod in "${modules[@]}"; do
            module_dir=$(dirname "$go_mod")
            workdir=${module_dir#./}
            echo "Running golangci-lint in ${module_dir}"
            docker run --rm \
              -v "${GITHUB_WORKSPACE}:/workspace" \
              -w "/workspace/${workdir}" \
              golangci/golangci-lint:v2.11.3 \
              golangci-lint run ./...
          done
