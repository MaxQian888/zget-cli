name: CI

on:
  push:
    branches: ['main', 'master']
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint and format checks
        run: pnpm test

      - name: Run component tests with coverage
        run: pnpm test:components:coverage

      - name: Run core tests with coverage
        run: pnpm test:core:coverage

      - name: Run command tests with coverage
        run: pnpm test:commands:coverage

      - name: Run docs tests with coverage
        run: pnpm test:docs:coverage

      - name: Verify generated docs are current
        run: pnpm docs:check

      - name: Run TypeScript compile check
        run: pnpm build:check

      - name: Build distributable
        run: pnpm build

      - name: Smoke test built CLI
        run: pnpm smoke

      - name: Verify npm package can be packed
        run: pnpm pack:check
